<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>{% block title %}DevWeb{% endblock %}</title>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="OsmHome" class="logo-img">
        </a>

        <form action="/search" method="get" class="search-bar">
            <input 
                type="text" 
                name="q" 
                placeholder="Rechercher un objet..." 
                value="{{ request.args.get('q', '') }}"
            />
            <select name="type">
                <option value="">Tous les types</option>
                {% for t in types %}
                    <option value="{{ t }}" {% if request.args.get('type') == t %}selected{% endif %}>
                        {{ t }}
                    </option>
                {% endfor %}
            </select>
            <select name="etat">
                <option value="">Tous les états</option>
                <option value="actif"   {% if request.args.get('etat') == 'actif'   %}selected{% endif %}>Actif</option>
                <option value="inactif" {% if request.args.get('etat') == 'inactif' %}selected{% endif %}>Inactif</option>
            </select>
            <button type="submit">Rechercher</button>
        </form>

        <nav>
            {% if user %}
                <a href="/profile" class="btn-profile">{{ user }}</a>
                <a href="/logout" class="btn-logout">Déconnexion</a>
            {% else %}
                <a href="/signup" class="btn-signup">Inscription</a>
                <a href="/login" class="btn-login">Connexion</a>
            {% endif %}
        </nav>
    </header>

    {% block content %}{% endblock %}

    <footer>
        <span>OsmHome</span> — Plateforme domotique intelligente &copy; 2026
    </footer>
</body>
</html>
