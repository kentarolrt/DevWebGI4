{% extends 'base.html' %}

{% block title %}Sign Up - DevWeb{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">{% endblock %}

{% block content %}
<div class="auth-page">

    <section class="auth-form-side">
        <div class="form-card auth-form-card">
            <p class="auth-form-kicker">Inscription</p>
            <h2 class="form-title">Créer un compte</h2>
            <p class="form-subtitle">Rejoignez votre espace OsmHome</p>

            {% if error %}
            <div class="form-error">
                <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
            </div>
            {% endif %}

            <form action="" method="post">
                <div class="form-group">
                    <label for="username">Pseudo</label>
                    <input type="text" name="username" id="username" class="username" placeholder="ex : alex.home" value="{{ form.username if form else '' }}" required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="lastname">Nom</label>
                        <input type="text" name="lastname" id="lastname" class="lastname" placeholder="Dupont" required />
                    </div>

                    <div class="form-group">
                        <label for="firstname">Prénom</label>
                        <input type="text" name="firstname" id="firstname" class="firstname" placeholder="Alex" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" class="email" placeholder="alex@email.com" required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Âge</label>
                        <input type="text" name="age" id="age" class="age" placeholder="24" required />
                    </div>

                    <div class="form-group">
                        <label for="gender">Genre</label>
                        <select name="gender" id="gender" class="gender">
                            <option value="male">Homme</option>
                            <option value="female">Femme</option>
                            <option value="other">Autre</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="birthdate">Date de naissance</label>
                    <input type="date" name="birthdate" id="birthdate" class="birthdate" required />
                </div>

                <div class="form-group">
                    <label for="member_type">Rôle dans la maison</label>
                    <select name="member_type" id="member_type">
                        <option value="père">Père</option>
                        <option value="mère">Mère</option>
                        <option value="fils">Fils</option>
                        <option value="fille">Fille</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" name="password" id="password" class="password" placeholder="••••••••" required />
                </div>

                <div class="form-actions">
                    <input type="submit" name="submit" value="Créer mon compte" class="btn btn-primary" />
                </div>
            </form>

            <div class="auth-divider">
                <span>ou</span>
            </div>

            <p class="auth-bottom-text">
                Déjà inscrit ?
                <a href="/login">Se connecter</a>
            </p>
        </div>
    </section>

</div>
{% endblock %}
